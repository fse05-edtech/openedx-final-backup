(function(){
  function injectLinks(menu) {
    if (menu.querySelector('.injected-link')) return;
    var seen = {};
    var links = document.querySelectorAll('.echi-learning-help-link');
    links.forEach(function(link) {
      var text = link.textContent.trim();
      if (seen[text]) return;
      seen[text] = true;
      var item = document.createElement('a');
      item.href = link.href;
      item.target = link.target || '_self';
      item.rel = link.rel || '';
      item.textContent = text + ' \u00BB';
      item.className = 'dropdown-item injected-link';
      item.style.cssText = 'display:block;padding:8px 24px;color:#212529;text-decoration:none;font-size:14px;';
      menu.appendChild(item);
    });
    var navLinks = document.querySelectorAll('.nav-course a');
    navLinks.forEach(function(link) {
      var text = link.textContent.trim();
      if (seen[text] || menu.querySelector('a[href="'+link.href+'"]')) return;
      seen[text] = true;
      var item = document.createElement('a');
      item.href = link.href;
      item.textContent = text + ' \u00BB';
      item.className = 'dropdown-item injected-link';
      item.style.cssText = 'display:block;padding:8px 24px;color:#212529;text-decoration:none;font-size:14px;';
      menu.appendChild(item);
    });
  }
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) {
          var menu = node.classList && node.classList.contains('dropdown-menu') ? node : node.querySelector && node.querySelector('.dropdown-menu.show');
          if (menu) injectLinks(menu);
        }
      });
    });
  });
  observer.observe(document.body, {childList: true, subtree: true});
  document.addEventListener('click', function() {
    setTimeout(function() {
      var menu = document.querySelector('.dropdown-menu.show');
      if (menu) injectLinks(menu);
    }, 100);
  });
})();
