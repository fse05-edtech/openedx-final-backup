<script>
(function() {
  // Track completion per unit URL
  var completedUnits = JSON.parse(localStorage.getItem('edx_completed_units') || '{}');
  var currentUnitCompleted = false;

  function getCurrentUnitKey() {
    return window.location.pathname;
  }

  function saveCompleted(key) {
    completedUnits[key] = true;
    try { localStorage.setItem('edx_completed_units', JSON.stringify(completedUnits)); } catch(e) {}
  }

  function isCurrentCompleted() {
    // Check localStorage
    if (completedUnits[getCurrentUnitKey()]) return true;
    // Check sidebar check-circle on active item
    var active = document.querySelector(".bg-info-100");
    if (active) {
      var li = active.closest("li") || active.parentElement;
      if (li && li.querySelector('[data-testid="check-circle-icon"]')) {
        saveCompleted(getCurrentUnitKey());
        return true;
      }
    }
    return currentUnitCompleted;
  }

  function showToast(msg) {
    var d = document.getElementById("gate-toast");
    if (!d) {
      d = document.createElement("div");
      d.id = "gate-toast";
      d.style.cssText = "position:fixed;top:90px;left:50%;transform:translateX(-50%);background:#cc0000;color:#fff;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:600;z-index:999999;font-family:sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.5);text-align:center;pointer-events:none;max-width:500px;line-height:1.5;";
      document.body.appendChild(d);
    }
    d.textContent = msg;
    d.style.opacity = "1";
    d.style.display = "block";
    clearTimeout(d._t);
    d._t = setTimeout(function(){ d.style.opacity="0"; }, 4000);
  }

  function hasVideoIframe() {
    return !!document.querySelector("iframe[title='Unit']");
  }

  function getNextUnitUrl() {
    var btn = document.querySelector("a.next-button");
    return btn ? btn.href : null;
  }

  function blockElement(el) {
    if (el.dataset.gb === "3") return;
    el.dataset.gb = "3";
    el.addEventListener("click", function(e) {
      if (!hasVideoIframe()) return;
      if (isCurrentCompleted()) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      showToast("Please complete the current video before accessing the next unit.");
      return false;
    }, true);
  }

  // Also intercept History API (React router navigation)
  var origPushState = history.pushState.bind(history);
  var origReplaceState = history.replaceState.bind(history);
  var currentPath = location.pathname;

  history.pushState = function(state, title, url) {
    if (url && url !== currentPath) {
      // Allow going backwards always
      // Block going to next unit if not completed
      if (hasVideoIframe() && !isCurrentCompleted()) {
        var nextUrl = getNextUnitUrl();
        if (nextUrl && url && nextUrl.includes(url.split('/').pop())) {
          showToast("Please complete the current video before accessing the next unit.");
          return;
        }
      }
    }
    return origPushState(state, title, url);
  };

  function attachBlocks() {
    // Next buttons
    document.querySelectorAll("a.next-button, button.next-button, [aria-label='Next']").forEach(blockElement);
    // Sidebar next unit links - only block FORWARD navigation
    var activeFound = false;
    document.querySelectorAll(".outline-sidebar li").forEach(function(li) {
      if (li.querySelector(".bg-info-100")) {
        activeFound = true;
        return;
      }
      if (activeFound) {
        // This is a unit AFTER current - block it
        li.querySelectorAll("a").forEach(function(a) {
          if (a.dataset.gb === "3") return;
          a.dataset.gb = "3";
          a.addEventListener("click", function(e) {
            if (!hasVideoIframe()) return;
            if (isCurrentCompleted()) return;
            e.preventDefault();
            e.stopImmediatePropagation();
            showToast("Please complete the current video before accessing the next unit.");
          }, true);
        });
      }
    });

    // Check completion status periodically
    var active = document.querySelector(".bg-info-100");
    if (active) {
      var li = active.closest("li") || active.parentElement;
      if (li && li.querySelector('[data-testid="check-circle-icon"]')) {
        currentUnitCompleted = true;
        saveCompleted(getCurrentUnitKey());
      }
    }
  }

  var lastUrl = location.href;
  setInterval(function() {
    attachBlocks();
    if (location.href !== lastUrl) {
      lastUrl = location.href;
      currentUnitCompleted = false;
      document.querySelectorAll("[data-gb]").forEach(function(el){ delete el.dataset.gb; });
    }
  }, 600);

  new MutationObserver(attachBlocks).observe(
    document.documentElement, {childList:true, subtree:true}
  );
})();
</script>
<script>
(function(){
  function injectLinks(menu) {
    if (menu.querySelector('.injected-link')) return;
    var seen = {};
    var links = document.querySelectorAll('.echi-learning-help-link');
    links.forEach(function(link) {
      var text = link.textContent.trim();
      if (seen[text]) return;
      seen[text] = true;
      var item = document.createElement('a');
      item.href = link.href;
      item.target = link.target || '_self';
      item.rel = link.rel || '';
      item.textContent = text + ' \u00BB';
      item.className = 'dropdown-item injected-link';
      item.style.cssText = 'display:block;padding:8px 24px;color:#212529;text-decoration:none;font-size:14px;';
      menu.appendChild(item);
    });
    var navLinks = document.querySelectorAll('.nav-course a');
    navLinks.forEach(function(link) {
      var text = link.textContent.trim();
      if (seen[text] || menu.querySelector('a[href="'+link.href+'"]')) return;
      seen[text] = true;
      var item = document.createElement('a');
      item.href = link.href;
      item.textContent = text + ' \u00BB';
      item.className = 'dropdown-item injected-link';
      item.style.cssText = 'display:block;padding:8px 24px;color:#212529;text-decoration:none;font-size:14px;';
      menu.appendChild(item);
    });
  }
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) {
          var menu = node.classList && node.classList.contains('dropdown-menu') ? node : node.querySelector && node.querySelector('.dropdown-menu.show');
          if (menu) injectLinks(menu);
        }
      });
    });
  });
  observer.observe(document.body, {childList: true, subtree: true});
  document.addEventListener('click', function() {
    setTimeout(function() {
      var menu = document.querySelector('.dropdown-menu.show');
      if (menu) injectLinks(menu);
    }, 100);
  });
})();

<script>
(function() {
  function addBreadcrumb() {
    if (document.getElementById('ndu-breadcrumb')) return;
    var header = document.querySelector('.learning-header, header, nav');
    if (!header) return;

    var courseName = '';
    var titleEl = document.querySelector('.course-title, h1, [class*="course-name"]');
    if (titleEl) courseName = titleEl.innerText.trim();
    if (!courseName) {
      var match = document.title.match(/^(.+?)\s*[|\-–]/);
      if (match) courseName = match[1].trim();
    }
    if (!courseName) courseName = 'Course';

    var crumb = document.createElement('div');
    crumb.id = 'ndu-breadcrumb';
    crumb.style.cssText = 'background:#f5c97a;padding:10px 40px;font-size:14px;font-weight:600;color:#1a1a1a;width:100%;box-sizing:border-box;border-bottom:1px solid #e0a840;';
    crumb.innerHTML = '<a href="/" style="color:#1a1a1a;text-decoration:none;">Home</a> &rsaquo; <a href="/dashboard" style="color:#1a1a1a;text-decoration:none;">Recommended Course</a> &rsaquo; <span>' + courseName + '</span>';
    header.insertAdjacentElement('afterend', crumb);
  }

  var tries = 0;
  var interval = setInterval(function() {
    addBreadcrumb();
    tries++;
    if (tries > 30) clearInterval(interval);
  }, 1000);
})();
</script>
<script>
(function(){
  function injectLinks(menu) {
    if (menu.querySelector('.injected-link')) return;
    var seen = {};
    var links = document.querySelectorAll('.echi-learning-help-link');
    links.forEach(function(link) {
      var text = link.textContent.trim();
      if (seen[text]) return;
      seen[text] = true;
      var item = document.createElement('a');
      item.href = link.href;
      item.target = link.target || '_self';
      item.rel = link.rel || '';
      item.textContent = text + ' \u00BB';
      item.className = 'dropdown-item injected-link';
      item.style.cssText = 'display:block;padding:8px 24px;color:#212529;text-decoration:none;font-size:14px;';
      menu.appendChild(item);
    });
    var navLinks = document.querySelectorAll('.nav-course a');
    navLinks.forEach(function(link) {
      var text = link.textContent.trim();
      if (seen[text] || menu.querySelector('a[href="'+link.href+'"]')) return;
      seen[text] = true;
      var item = document.createElement('a');
      item.href = link.href;
      item.textContent = text + ' \u00BB';
      item.className = 'dropdown-item injected-link';
      item.style.cssText = 'display:block;padding:8px 24px;color:#212529;text-decoration:none;font-size:14px;';
      menu.appendChild(item);
    });
  }
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) {
          var menu = node.classList && node.classList.contains('dropdown-menu') ? node : node.querySelector && node.querySelector('.dropdown-menu.show');
          if (menu) injectLinks(menu);
        }
      });
    });
  });
  observer.observe(document.body, {childList: true, subtree: true});
  document.addEventListener('click', function() {
    setTimeout(function() {
      var menu = document.querySelector('.dropdown-menu.show');
      if (menu) injectLinks(menu);
    }, 100);
  });
})();
</script></body></html>
<script>
(function() {
  var DASHBOARD = "https://apps.edx.echiphub.in/learner-dashboard/";
  function getCourseId() {
    var m = window.location.pathname.match(/\/learning\/course\/(course-v1:[^\/]+)/);
    return m ? m[1] : null;
  }
  function isHomePage() {
    return /\/home$/.test(window.location.pathname);
  }
  var BAD_TITLES = ["recommended course", "course", "edtech", "loading"];
  function isTitleReady() {
    var parts = document.title.split("|").map(function(s){ return s.trim().toLowerCase(); });
    if (parts.length < 2) return false;
    var courseName = parts[parts.length - 2];
    if (courseName.length < 5) return false;
    for (var i = 0; i < BAD_TITLES.length; i++) {
      if (courseName === BAD_TITLES[i]) return false;
    }
    return true;
  }
  function buildCrumbHTML() {
    var parts = document.title.split("|").map(function(s){ return s.trim(); });
    var courseId = getCourseId();
    var courseHomeUrl = courseId ? "https://apps.edx.echiphub.in/learning/course/" + courseId + "/home" : "#";
    var courseName = parts[parts.length - 2];
    var unitName = parts[0];
    var homeLink = "<a href=" + DASHBOARD + " style=color:#1a1a2e;text-decoration:none;>Home</a>";
    var courseLink = "<a href=" + courseHomeUrl + " style=color:#1a1a2e;text-decoration:none;>" + courseName + "</a>";
    if (isHomePage()) {
      return homeLink + " &rsaquo; " + courseName;
    } else {
      return homeLink + " &rsaquo; " + courseLink + " &rsaquo; " + unitName;
    }
  }
  function placeBreadcrumb() {
    var crumb = document.getElementById("ndu-breadcrumb");
    if (!crumb) return;
    var toolbar = document.querySelector("[data-testid=instructor-toolbar]");
    if (toolbar) {
      if (toolbar.nextElementSibling !== crumb) toolbar.insertAdjacentElement("afterend", crumb);
    } else {
      var header = document.querySelector("header.learning-header");
      if (header && header.nextElementSibling !== crumb) header.insertAdjacentElement("afterend", crumb);
    }
  }
  function fixResumeButton() {
    document.querySelectorAll("a, button").forEach(function(el) {
      if (el.textContent.trim() === "Resume course") {
        el.style.setProperty("color", "#ffffff", "important");
      }
    });
  }
  // Create crumb hidden from start
  var crumb = document.createElement("div");
  crumb.id = "ndu-breadcrumb";
  crumb.style.cssText = "background:#f5a623;color:#1a1a2e;padding:6px 1.5rem;font-size:13px;font-weight:500;width:100%;box-sizing:border-box;border-bottom:1px solid #d4941f;display:none;";
  document.addEventListener("DOMContentLoaded", function() {
    document.body.appendChild(crumb);
  });
  var lastUrl = location.href;
  // Single interval does everything - no MutationObserver for show/hide
  setInterval(function() {
    // Handle SPA navigation
    if (location.href !== lastUrl) {
      lastUrl = location.href;
      crumb.style.display = "none";
      crumb.innerHTML = "";
    }
    var header = document.querySelector("header.learning-header");
    if (!header) return;
    // Place crumb correctly
    placeBreadcrumb();
    fixResumeButton();
    // Show only when title is ready
    if (isTitleReady()) {
      if (crumb.innerHTML === "" || crumb.style.display === "none") {
        crumb.innerHTML = buildCrumbHTML();
        crumb.style.display = "block";
      }
    }
  }, 300);
})();
</script>
